<!DOCTYPE html>
<html lang="es">
    <head>

        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <title>Casa de té</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="shortcut icon" href="imagenes/icono.png">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
            </style>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            'pixel': ["'Jersey 15'", 'sans-serif'],
                            }
                        }
                    }
                }
        </script>
    </head>
       
    <body class="font-pixel bg-[url('imagenes/background.png')] bg-cover bg-center bg-fixed">
        <header class="flex items-center gap-3 bg-[rgb(127,178,115)]">
            <div class="flex items-center">
                <img src="imagenes/icono.png" alt="Taza de té hecha con pixelart" class="h-20 w-auto">
                <h1 class="font-pixel text-5xl text-[rgb(220,215,215)]">Casa de té</h1>
            </div>

            <nav>
                <ul class="flex justify-between gap-8 font-pixel text-xl text-[rgb(34,21,17)]">
                    <li><a href="inicio.html" class="hover:text-[rgb(220,215,215)]">Inicio</a></li>
                    <li><a href="teces.html" class="hover:text-[rgb(220,215,215)]">Té's</a></li>
                    
                    <!--lista desplegable maridaje-->
                    <li class="relative group"><a href="maridaje.html" class="cursor-pointer hover:text-[rgb(220,215,215)]">Maridaje</a>
                        <ul class="absolute hidden group-hover:block bg-[rgb(127,178,115)] p-2 rounded">
                            <li class="hover:text-[rgb(220,215,215)]"><a href="dulces.html">Dulces</a></li>
                            <li class="hover:text-[rgb(220,215,215)]"><a href="salados.html">Salados</a></li>
                        </ul>
                    <li><a href="nosotros.html" class="hover:text-[rgb(220,215,215)]">Nosotros</a></li>

                    </li>
                </ul>
            </nav>

        <main>

        </main>

            <!--card de tes-->
            <a href="teces.html" class="card">
             <img src="imagenes/celeste.png" alt="taza de té color celeste">
             <span>Tes</span>
            </a>

            <!--car de combos. naranja-->
            <a href="combos.html" class="card">
                <img src="imagenes/naranja.png" alt="taza color naranja">
                <span>Combos</span>
            </a>

            <a href="nosotros.html" class="card">
                <img src="imagenes/morada.png" alt="taza color morado">
