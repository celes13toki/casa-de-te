<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <title>Casa de té</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="shortcut icon" href="imagenes/icono.png">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
            </style>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            'pixel': ["'Jersey 15'", 'sans-serif'],
                            }
                        }
                    }
                }
        </script>
    </head>
       
    <body class="font-pixel bg-[url('imagenes/background.png')] bg-cover bg-center bg-fixed text-[rgb(34,21,17)]">
        <header class="flex items-center gap-5 justify-between p-2 bg-[rgb(127,178,115)] border-4 border-[rgb(127,178,115)] border-b-[rgb(100,145,89)]">
            <div class="flex items-center">
                <img src="imagenes/icono.png" alt="Taza de té hecha con pixelart" class="h-20 w-auto">
                <h1 class="text-5xl text-[rgb(220,215,215)]">Casa de té</h1>
            </div>

            <nav>
                <ul class="flex justify-between gap-8 text-xl text-[rgb(34,21,17)]">
                    <li><a href="inicio.html" class="hover:text-[rgb(220,215,215)]">Inicio</a></li>
                    <li><a href="teces.html" class="hover:text-[rgb(220,215,215)]">Té's</a></li>
                    
                    <!--lista desplegable maridaje-->
                    <li class="relative group"><a href="maridaje.html" class="cursor-pointer hover:text-[rgb(220,215,215)]">Maridaje</a>
                        <ul class="absolute hidden group-hover:block bg-[rgb(127,178,115)] p-2 rounded border-4 border-[rgb(127,178,115)]  border-b-[rgb(100,145,89)] border-x-[rgb(100,145,89)]">
                            <li class="hover:text-[rgb(220,215,215)]"><a href="dulces.html">Dulces</a></li>
                            <li class="hover:text-[rgb(220,215,215)]"><a href="salados.html">Salados</a></li>
                        </ul>
                    <li><a href="nosotros.html" class="hover:text-[rgb(220,215,215)]">Nosotros</a></li>
                    </li>
                </ul>
            </nav>

        </header>

        <main>
            <h2 class="text-3xl text-center py-10 pb-20">Descubre el té perfecto para cada momento</h2>
        </main>

        <div class="flex flex-row items-center justify-around gap-8 p-2 text-center text-xl">

            <!--card de tes-->
            <a href="teces.html"> <!--poner hover en class-->
             <img src="imagenes/celeste.png" alt="taza de té color celeste">
             <span>Te's</span>
            </a>

            <!--card de maridaje. rosada-->
            <a href="maridaje.html">
                <img src="imagenes/rosa.png" alt="taza color rosa">
                <span>Maridaje</span>
            </a>

            <!--card de nosotros-->
            <a href="nosotros.html">
                <img src="imagenes/verde.png" alt="taza color verde">
                <span>Nosotros</span>
            </a>

        </div>

        <footer class="text-5l text-[rgb(220,215,215)] text-center pt-20">
            <p>Acevedo Celeste Guadalupe<br>Todos los derechos reservados<br>@2026</p>
        </footer>
    </body>
</html>
